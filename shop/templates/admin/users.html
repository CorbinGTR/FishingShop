{% extends "admin/base_admin.html" %}
{% block admin_content %}
<h1 class="page-title">Пользователи</h1>
<table class="table table-bordered bg-white">
    <tr>
        <th>ID</th>
        <th>Логин</th>
        <th>Email</th>
        <th>Сотрудник</th>
        <th>Дата регистрации</th>
    </tr>
    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.is_staff }}</td>
        <td>{{ user.date_joined }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

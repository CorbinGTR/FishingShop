{% extends "base.html" %}
{% block content %}
<div class="card p-4">
    <div class="row">
        <div class="col-md-5">
            {% if product.image %}
            <img src="{{ product.image.url }}" class="img-fluid rounded">
            {% endif %}
        </div>
        <div class="col-md-7">
            <h1 class="page-title">{{ product.name }}</h1>
            <h3 class="price">{{ product.price }} ₽</h3>
            <p>{{ product.description }}</p>
            <a href="{% url 'shop:cart_add' product.id %}" class="btn btn-main">
                Добавить в корзину
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<h1 class="page-title">Оформление заказа</h1>
<div class="card p-4 col-md-7">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label>Имя</label>
            {{ form.customer_name }}
        </div>
        <div class="mb-3">
            <label>Телефон</label>
            {{ form.phone }}
        </div>
        <div class="mb-3">
            <label>Адрес доставки</label>
            {{ form.address }}
        </div>
        <button class="btn btn-main">Подтвердить заказ</button>
    </form>
</div>
{% endblock %}
